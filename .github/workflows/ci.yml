name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  GO_VERSION: "1.25"

jobs:
  quality-modules:
    name: Quality ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        module:
          - postgres
          - mongodb
          - schemas
          - tools/mock-generator

    steps:
      - name: Checkout código
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Instalar golangci-lint
        shell: bash
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.7
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Calidad del módulo
        run: |
          make -C "${{ matrix.module }}" fmt-check
          make -C "${{ matrix.module }}" vet
          make -C "${{ matrix.module }}" lint

  build-modules:
    name: Build ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        module:
          - postgres
          - mongodb
          - schemas
          - tools/mock-generator

    steps:
      - name: Checkout código
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build módulo
        run: make -C "${{ matrix.module }}" build

  test-modules:
    name: Test ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        module:
          - postgres
          - mongodb
          - schemas
          - tools/mock-generator

    steps:
      - name: Checkout código
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Tests del módulo
        run: make -C "${{ matrix.module }}" test
