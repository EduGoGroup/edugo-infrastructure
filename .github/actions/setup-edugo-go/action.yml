name: 'Setup EduGo Go Environment'
description: 'Configura Go con version estandar EduGo y acceso a repos privados'
author: 'EduGo Team'

branding:
  icon: 'package'
  color: 'blue'

inputs:
  go-version:
    description: 'Version de Go a usar'
    required: false
    default: '1.25'

  cache:
    description: 'Habilitar cache de Go modules'
    required: false
    default: 'true'

  cache-dependency-path:
    description: 'Path a go.sum para cache'
    required: false
    default: 'go.sum'

  github-token:
    description: 'GitHub token para acceso a repos privados'
    required: false
    default: ${{ github.token }}

outputs:
  go-version:
    description: 'Version de Go instalada'
    value: ${{ steps.setup.outputs.go-version }}

  cache-hit:
    description: 'Si el cache fue encontrado'
    value: ${{ steps.setup.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: Setup Go
      id: setup
      uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go-version }}
        cache: ${{ inputs.cache }}
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Configurar acceso a repos privados
      shell: bash
      run: |
        echo "Configurando acceso a repos privados de EduGoGroup..."
        echo "::add-mask::${GH_TOKEN}"
        git config --global url."https://${GH_ACTOR}:${GH_TOKEN}@github.com/EduGoGroup/".insteadOf "https://github.com/EduGoGroup/"
        # Exportar GOPRIVATE al entorno del job (persiste a todos los steps posteriores:
        # go mod download / go mod verify). GOPRIVATE implica GONOPROXY+GONOSUMDB, asi que
        # los modulos first-party de la org van directo a git y NO consultan proxy/sumdb
        # publicos, donde quedaron versiones fantasma inmutables tras limpiezas de historial.
        echo "GOPRIVATE=github.com/EduGoGroup/*" >> "$GITHUB_ENV"
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GH_ACTOR: ${{ github.actor }}

    - name: Verificar configuracion
      shell: bash
      run: |
        echo "========================================"
        echo "Go Environment Configurado"
        echo "========================================"
        echo "Go version: $(go version)"
        echo "GOROOT: $(go env GOROOT)"
        echo "GOPATH: $(go env GOPATH)"
        echo "GOPRIVATE (job env): $GOPRIVATE"
        echo "GOPRIVATE (go env): $(go env GOPRIVATE)"
        echo "Cache enabled: ${{ inputs.cache }}"
        echo "Cache hit: ${{ steps.setup.outputs.cache-hit }}"
        echo "========================================"
